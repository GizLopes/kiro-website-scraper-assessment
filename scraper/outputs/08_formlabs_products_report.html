<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extraction Report — formlabs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #f8f9fa;
      color: #212529;
      padding: 24px;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #343a40;
    }
    .stats {
      margin-bottom: 10px;
      font-size: 13px;
      color: #495057;
    }
    .legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #495057;
    }
    .swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 1px solid #ced4da;
      border-radius: 2px;
      vertical-align: middle;
    }
    .table-wrapper {
      overflow-x: auto;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: #fff;
    }
    thead tr {
      background: #343a40;
      color: #fff;
    }
    th {
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      font-size: 12px;
      letter-spacing: .03em;
    }
    td {
      padding: 6px 10px;
      border-bottom: 1px solid #dee2e6;
      vertical-align: top;
      max-width: 320px;
      overflow-wrap: break-word;
    }
    tbody tr:hover td {
      filter: brightness(0.96);
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      vertical-align: middle;
      margin-left: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-low     { background:#ffc107; color:#212529; }
    .badge-missing { background:#dc3545; color:#fff; }
  </style>
</head>
<body>
  <h1>Extraction Report — formlabs</h1>
  <p>No products extracted.</p>
</body>
</html>
